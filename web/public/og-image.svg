<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Architecture sketch decoration (top-right corner) -->
  <g opacity="0.35" stroke="#a5b4fc" fill="none" stroke-width="2">
    <rect x="900" y="80" width="80" height="40" rx="6"/>
    <rect x="1020" y="80" width="80" height="40" rx="6"/>
    <line x1="980" y1="100" x2="1020" y2="100"/>
    <rect x="960" y="160" width="80" height="40" rx="6"/>
    <line x1="940" y1="120" x2="1000" y2="160"/>
    <line x1="1060" y1="120" x2="1000" y2="160"/>
    <circle cx="1000" cy="240" r="22"/>
    <line x1="1000" y1="200" x2="1000" y2="218"/>
  </g>

  <!-- Logo badge -->
  <rect x="80" y="80" width="108" height="108" rx="24" fill="url(#logo)"/>
  <text x="134" y="142" font-size="44" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-weight="700" fill="#ffffff" letter-spacing="-1">SD</text>
  <rect x="96" y="156" width="76" height="4" rx="2" fill="#c7d2fe"/>
  <text x="134" y="180" font-size="11" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-weight="600" fill="#a5b4fc" letter-spacing="2">ZERO-HERO</text>

  <!-- Main title -->
  <text x="80" y="280" font-size="68"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="700" fill="#f8fafc" letter-spacing="-2">System Design</text>
  <text x="80" y="350" font-size="68"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="700" fill="url(#accent)" letter-spacing="-2">Zero to Hero</text>

  <!-- Subtitle -->
  <text x="80" y="410" font-size="26"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-weight="400" fill="#cbd5e1">60-day interview prep · 20 designs · 24 patterns</text>

  <!-- Bottom stats / pills -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
     font-size="18" font-weight="600" fill="#0f172a">
    <rect x="80" y="490" width="220" height="48" rx="24" fill="#a5b4fc"/>
    <text x="190" y="521" text-anchor="middle">RESHADED framework</text>

    <rect x="316" y="490" width="180" height="48" rx="24" fill="#c7d2fe"/>
    <text x="406" y="521" text-anchor="middle">24 case studies</text>

    <rect x="512" y="490" width="200" height="48" rx="24" fill="#a5b4fc"/>
    <text x="612" y="521" text-anchor="middle">Spaced repetition</text>

    <rect x="728" y="490" width="180" height="48" rx="24" fill="#c7d2fe"/>
    <text x="818" y="521" text-anchor="middle">Mermaid diagrams</text>
  </g>

  <!-- URL -->
  <text x="80" y="590" font-size="16"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-weight="500" fill="#64748b">vinay199129.github.io/system-design-zth</text>
</svg>
